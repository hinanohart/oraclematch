name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    env:
      # PyPI publish is skipped (workflow stays green) unless a PYPI_TOKEN secret is configured.
      HAS_PYPI: ${{ secrets.PYPI_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Check artifacts
        run: |
          python -m pip install twine
          twine check dist/*
      - name: Publish to PyPI
        if: env.HAS_PYPI == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_TOKEN }}
